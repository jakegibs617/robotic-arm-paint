# Default 6DOF arm configuration.
#
# Joint order is fixed and matches the controller's servo channels:
#   0: base        (rotation around vertical axis)
#   1: shoulder
#   2: elbow
#   3: wrist_pitch
#   4: wrist_roll
#   5: gripper      (used as marker clamp / unused)
#
# IMPORTANT: min/max are SAFE software limits in servo degrees. Commands outside
# these ranges are rejected. Tighten them during Phase 1 hardware bring-up
# (record real safe angles per joint before drawing).
#
# STS3215 note: the servo range is 0..360 deg with mid position at 180 deg
# (encoder count 2048). The placeholder ranges below assume a 0..180 hobby
# servo; expect to re-center them around 180 once horns are mounted.

serial:
  # STS3215 factory default is 1 Mbps (only used for real connections).
  baud: 1000000
  # Default port is null; pass --port on the CLI or set it here once known,
  # e.g. /dev/tty.usbserial-1420 (FE-URT-2 adapter; see docs/hardware_identification.md)
  port: null
  timeout_s: 1.0
  # Protocol the servos speak. "mock" runs fully in software; switch to
  # "sts3215" (Feetech STS bus servos, the ordered hardware) for bring-up.
  # Servo bus IDs must be assigned to match the channel numbers below (0..5).
  # Other encoders: "ascii_servo" (Arduino PWM fallback), "lx16a".
  protocol: mock

motion:
  # Degrees per step when interpolating a move; lower = smoother + slower.
  max_step_deg: 2.0
  # Delay between interpolation steps (seconds). Start slow for safety.
  step_delay_s: 0.02

joints:
  - name: base
    channel: 0
    min_deg: 0
    max_deg: 180
    home_deg: 90
    invert: false
  - name: shoulder
    channel: 1
    min_deg: 20
    max_deg: 160
    home_deg: 90
    invert: false
  - name: elbow
    channel: 2
    min_deg: 20
    max_deg: 160
    home_deg: 90
    invert: false
  - name: wrist_pitch
    channel: 3
    min_deg: 0
    max_deg: 180
    home_deg: 90
    invert: false
  - name: wrist_roll
    channel: 4
    min_deg: 0
    max_deg: 180
    home_deg: 90
    invert: false
  - name: gripper
    channel: 5
    min_deg: 10
    max_deg: 150
    home_deg: 30
    invert: false
